workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    environment:
      groups:
        - pace-env
        - app-store-credentials
      vars:
        BUNDLE_ID: "com.pace.runapp"
        XCODE_SCHEME: "App"
        XCODE_PROJECT: "App.xcodeproj"
        DEVELOPMENT_TEAM: "3GHBFTSZ9H"
      xcode: 16.2
      node: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web app
        script: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          echo "Using profile UUID: e7dfad80-3b90-4ada-bcc8-602aa7fede1b"
      - name: Create export options
        script: |
          cat > /tmp/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>3GHBFTSZ9H</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.pace.runapp</key>
              <string>Pace App Store</string>
            </dict>
          </dict>
          </plist>
          EOF
      - name: Build iOS IPA
        script: |
          cd ios/App
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="e7dfad80-3b90-4ada-bcc8-602aa7fede1b" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="3GHBFTSZ9H" \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/export_options.plist
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
