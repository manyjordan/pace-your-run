workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    environment:
      groups:
        - pace-env
        - app-store-credentials
      vars:
        BUNDLE_ID: "com.pace.runapp"
        XCODE_SCHEME: "App"
        XCODE_PROJECT: "App.xcodeproj"
      xcode: 16.2
      node: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pace.runapp
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web app
        script: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          # Copy provisioning profiles to the right location
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          find ~/Library/MobileDevice -name "*.mobileprovision" -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/ \;
          find /Users/builder -name "*.mobileprovision" 2>/dev/null -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/ \;
          echo "Profiles found:"
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles found"
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
