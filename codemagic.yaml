workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    environment:
      groups:
        - pace-env
        - app-store-credentials
      vars:
        BUNDLE_ID: "com.pace.runapp"
        XCODE_SCHEME: "App"
        XCODE_PROJECT: "App.xcodeproj"
      xcode: 16.2
      node: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web app
        script: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          find /Users/builder/Library/MobileDevice/Certificates -name "*.mobileprovision" 2>/dev/null \
            -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/ \; || true
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          echo "Using profile: $PROFILE_PATH"
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | \
            /usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin)
          echo "Profile UUID: $PROFILE_UUID"
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
      - name: Build iOS IPA
        script: |
          cd ios/App
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$(echo $PROFILE_UUID)" \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /Users/builder/export_options.plist
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
